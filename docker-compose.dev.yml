# Ambiente de DESENVOLVIMENTO: Django (runserver) + Vite (HMR), 2 containers.
# Uso: ./start-dev.sh   (ou: docker compose -f docker-compose.dev.yml --env-file .env.dev up --build)
services:
  django:
    build:
      context: ./django
      dockerfile: Dockerfile.dev
    volumes:
      - ./django/src:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    command: python manage.py runserver 0.0.0.0:8000

  vite:
    build:
      context: ./boletim-vite
      dockerfile: Dockerfile.dev
    volumes:
      - ./boletim-vite:/app
      - vite_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    # "npm install" roda a cada start (rápido quando já está tudo instalado) para
    # sincronizar o node_modules do volume nomeado sempre que package.json mudar —
    # senão o volume antigo fica "preso" numa versão de dependências desatualizada
    # mesmo depois de reconstruir a imagem.
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  vite_node_modules:
