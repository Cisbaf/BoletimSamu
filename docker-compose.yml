services:
  application:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - static_volume:/app/src/staticfiles
      - media_volume:/app/src/media
    expose:
      - 8000
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "${BOLETIM_PORT:-8080}:80"
    volumes:
      - static_volume:/app/src/staticfiles
      - media_volume:/app/src/media
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - application

volumes:
  static_volume:
  media_volume:
